- id: '1776943566117'
  alias: Temperaturplan Felix rum
  description: Styr radiator enligt schema
  triggers:
  - at: 06:00:00
    id: morgon
    trigger: time
  - at: 07:00:00
    id: dag
    trigger: time
  - at: '13:00:00'
    id: eftermiddag
    trigger: time
  - at: '18:00:00'
    id: kväll
    trigger: time
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: morgon
      sequence:
      - target:
          entity_id: climate.termostat
        data:
          temperature: 24
        action: climate.set_temperature
    - conditions:
      - condition: trigger
        id: dag
      sequence:
      - target:
          entity_id: climate.termostat
        data:
          temperature: 18
        action: climate.set_temperature
    - conditions:
      - condition: trigger
        id: eftermiddag
      sequence:
      - target:
          entity_id: climate.termostat
        data:
          temperature: 20
        action: climate.set_temperature
    - conditions:
      - condition: trigger
        id: kväll
      sequence:
      - target:
          entity_id: climate.termostat
        data:
          temperature: 18
        action: climate.set_temperature
  mode: single
- id: '1780645892652'
  alias: Tvättstuga ventilation absolut fuktighet
  description: ''
  triggers:
  - id: starta
    value_template: "{{ states('sensor.absolut_fuktighet_tvattstuga') | float(0) >\n
      \  states('sensor.absolut_fuktighet_ute') | float(0) + 0.7 }}\n"
    for:
      minutes: 5
    trigger: template
  - id: stoppa
    value_template: "{{ states('sensor.absolut_fuktighet_tvattstuga') | float(0) <\n
      \  states('sensor.absolut_fuktighet_ute') | float(0) + 0.2 }}\n"
    for:
      minutes: 10
    trigger: template
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: starta
      sequence:
      - target:
          entity_id: light.vagguttag_kattrum_tretakt
        action: light.turn_on
    - conditions:
      - condition: trigger
        id: stoppa
      sequence:
      - target:
          entity_id: light.vagguttag_kattrum_tretakt
        action: light.turn_off
  mode: single
