            name: Ventilation gynnsam
          - entity: light.vagguttag_kattrum_tretakt
            name: Badrumsfläkt / kattrum
          - type: divider
          - entity: sensor.absolut_fuktighet_ute
            name: Absolut fuktighet ute
          - entity: sensor.absolut_fuktighet_tvattstuga
            name: Absolut fuktighet tvättstuga
          - type: divider
          - entity: automation.tvattstuga_ventilation_absolut_fuktighet
            name: Automation ventilation

      - type: entities
        title: Utomhus
        show_header_toggle: false
        entities:
          - entity: weather.forecast_hem
            name: Väder
          - entity: sensor.utetemp_temperatur
            name: Temperatur
          - entity: sensor.vindhastighet_i_m_s
            name: Vindhastighet
